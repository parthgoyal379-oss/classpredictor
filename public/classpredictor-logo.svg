<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1929;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#07101E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#3B82F6" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="200" fill="url(#bgGrad)"/>

  <!-- Outer ring -->
  <circle cx="200" cy="200" r="185" fill="none" stroke="rgba(59,130,246,0.15)" stroke-width="1.5"/>
  <circle cx="200" cy="200" r="175" fill="none" stroke="rgba(139,92,246,0.1)" stroke-width="1"/>

  <!-- Main icon background -->
  <rect x="120" y="110" width="160" height="160" rx="28" fill="url(#iconGrad)" filter="url(#shadow)" opacity="0.15"/>
  <rect x="120" y="110" width="160" height="160" rx="28" fill="none" stroke="url(#iconGrad)" stroke-width="2"/>

  <!-- Graph bars inside icon -->
  <rect x="148" y="210" width="22" height="40" rx="5" fill="#3B82F6" opacity="0.9"/>
  <rect x="178" y="185" width="22" height="65" rx="5" fill="#8B5CF6" opacity="0.9"/>
  <rect x="208" y="160" width="22" height="90" rx="5" fill="url(#iconGrad)" opacity="1" filter="url(#glow)"/>

  <!-- Arrow going up-right (prediction) -->
  <path d="M148 200 L175 175 L195 185 L220 155" stroke="#EC4899" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- Arrow head -->
  <polygon points="220,155 210,158 216,166" fill="#EC4899" filter="url(#glow)"/>

  <!-- Dots on graph line -->
  <circle cx="148" cy="200" r="4" fill="#3B82F6" filter="url(#glow)"/>
  <circle cx="175" cy="175" r="4" fill="#8B5CF6" filter="url(#glow)"/>
  <circle cx="220" cy="155" r="5" fill="#EC4899" filter="url(#glow)"/>

  <!-- Small warning dot top right of icon -->
  <circle cx="262" cy="118" r="12" fill="#EF4444"/>
  <text x="262" y="123" text-anchor="middle" font-size="13" font-weight="900" fill="white" font-family="Arial">!</text>

  <!-- Brand name -->
  <text x="200" y="310" text-anchor="middle" font-size="28" font-weight="900" fill="url(#textGrad)" font-family="Arial, sans-serif" letter-spacing="-0.5">ClassPredictor</text>

  <!-- Tagline -->
  <text x="200" y="335" text-anchor="middle" font-size="11" fill="rgba(107,114,128,1)" font-family="Arial, sans-serif" letter-spacing="2">KNOW BEFORE YOU STRUGGLE</text>

  <!-- Bottom credit line -->
  <text x="200" y="362" text-anchor="middle" font-size="10" fill="rgba(245,158,11,0.8)" font-family="Arial, sans-serif" letter-spacing="1">by Parth Goyal</text>

  <!-- Subtle corner accents -->
  <path d="M30 50 L30 30 L50 30" stroke="rgba(59,130,246,0.3)" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M350 30 L370 30 L370 50" stroke="rgba(139,92,246,0.3)" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M30 350 L30 370 L50 370" stroke="rgba(139,92,246,0.3)" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M370 350 L370 370 L350 370" stroke="rgba(59,130,246,0.3)" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
